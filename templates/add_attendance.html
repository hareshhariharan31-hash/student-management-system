{% extends "base.html" %}
{% block content %}

<h2>Add Attendance</h2>

<div class="col-md-5">
<div class="card p-4 shadow">

<form method="POST">

<button class="btn btn-warning w-100">Add Attendance</button>

</form>

</div>
</div>

{% endblock %}
