<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <body class="{% if session.username and session.get('theme') == 'dark' %}dark-mode{% endif %}"></body>
    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode .card {
            background-color: #1e1e1e;
            color: white;
        }

        .dark-mode .navbar {
            background-color: #000 !important;
        }

        .dark-mode .btn-outline-light {
            border-color: #ffffff;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/">Student Management System</a>
  <body class="{% if session.username and session.get('theme') == 'dark' %}dark-mode{% endif %}"></body>
  <div class="ms-auto">
    <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
    <a href="/about" class="btn btn-outline-light btn-sm me-2">About</a>
    <a href="/contact" class="btn btn-outline-light btn-sm me-2">Contact</a>

    <a href="/toggle_theme" class="btn btn-warning btn-sm me-2">
    Toggle Theme
</a>

    {% if session.username %}
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    {% else %}
        <a href="/login" class="btn btn-success btn-sm">Login</a>
    {% endif %}
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }
};
</script>

</body>
</html>
